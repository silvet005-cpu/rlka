<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<style>
  .box { fill: #ffffff; stroke: #6b7280; stroke-width: 1.5; }
  .box-warn { fill: #faece7; stroke: #d85a30; stroke-width: 1.5; }
  .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111827; }
  .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #4b5563; }
  .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#6b7280"/>
  </marker>
</defs>

<text x="340" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#111827" text-anchor="middle">Diagrama AS-IS — Estado actual (sin agente)</text>

<rect class="box" x="230" y="40" width="220" height="44" rx="8"/>
<text x="340" y="66" class="title" text-anchor="middle">Carpeta principal (Drive)</text>
<path class="arrow" d="M340,84 V114"/>

<rect class="box" x="200" y="114" width="280" height="56" rx="8"/>
<text x="340" y="136" class="title" text-anchor="middle">Subcarpetas por tema</text>
<text x="340" y="154" class="subtitle" text-anchor="middle">Políticas, Procedimientos, RRHH</text>
<path class="arrow" d="M340,170 V200"/>

<rect class="box-warn" x="200" y="200" width="280" height="56" rx="8"/>
<text x="340" y="222" class="title" text-anchor="middle">Búsqueda manual por texto</text>
<text x="340" y="240" class="subtitle" text-anchor="middle">Requiere conocer palabras exactas</text>
<path class="arrow" d="M340,256 V286"/>

<rect class="box-warn" x="200" y="286" width="280" height="56" rx="8"/>
<text x="340" y="308" class="title" text-anchor="middle">Lectura manual del documento</text>
<text x="340" y="326" class="subtitle" text-anchor="middle">Sin respuesta directa ni fuente citada</text>
</svg>
